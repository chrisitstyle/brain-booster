spring:
  application:
    name: Brain Booster Backend Test

  # Testcontainers + @ServiceConnection will automatically inject the appropriate URL, username, and password for Postgres

  flyway:
    enabled: true
    clean-disabled: false # useful in tests, allows using flyway.clean() if needed

  jpa:
    hibernate:
      ddl-auto: validate  # flyway creates the database structure, hibernate only validates if java entities match the tables
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  mvc:
    pathmatch:
      matching-strategy: ant-path-matcher
  ################################################

server:
  servlet:
    context-path: /api/v1

logging:
  level:
    org:
      springframework:
        security: ERROR
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE

