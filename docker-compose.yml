services:
  database:
    image: postgres:17-alpine
    container_name: brain-booster-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-brain-booster}
      POSTGRES_USER: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - brain-booster-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - brain-booster-network

  backend:
    build:
      context: ./brain-booster-backend
      dockerfile: Dockerfile
    container_name: brain-booster-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/${POSTGRES_DB:-brain-booster}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - brain-booster-network

  frontend:
    build:
      context: ./brain-booster-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://backend:8080/api/v1}
    container_name: brain-booster-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://backend:8080/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - brain-booster-network

networks:
  brain-booster-network:
    driver: bridge

volumes:
  brain-booster-db-data:
